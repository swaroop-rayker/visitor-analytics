user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    access_log off;
    error_log /var/log/nginx/error.log crit;
    sendfile on;
    keepalive_timeout 30;
    client_max_body_size 32k;

    # Real IP configuration for Cloudflare Tunnels & Docker proxies
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    limit_req_zone $binary_remote_addr zone=tracking:1m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=login:1m rate=5r/m;
    limit_req_log_level notice;

    upstream backend {
        server backend:8000;
        keepalive 8;
    }
    upstream frontend {
        server frontend:3000;
        keepalive 8;
    }

    server {
        listen 80 default_server;
        server_name _;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

        location = /go {
            limit_req zone=tracking burst=10 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params;
        }
        location /api/v1/sync {
            limit_req zone=tracking burst=10 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params;
        }
        location = /api/v1/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params;
        }
        location /api/ {
            proxy_pass http://backend;
            include /etc/nginx/proxy_params;
        }
        location = /healthz {
            proxy_pass http://backend;
        }
        location / {
            proxy_pass http://frontend;
            include /etc/nginx/proxy_params;
        }
    }
}
